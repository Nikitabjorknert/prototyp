<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personuppgifter</title>
    <link rel="stylesheet" href="./form.css">
    <script type="module" src="./main.js"></script>
</head>
<body>
    <header>
         <nav id="avbryt">
        <a href="../index.html">⨂ Avbryt bokning</a>
        </nav>

        <h1>3. Slutför bokning</h1>
    </header>
<main>
    <section id="summary">
            <h2>Översikt</h2>
            <p><b>Behandling:</b> <span id="showB"></span></p>
            <p><b>Datum:</b> <span id="showD"></span></p>
            <p><b>Tid:</b> <span id="showT"></span></p>
        </section>

        <fieldset>
            <legend>Fyll i uppgifter</legend>
            <label for="name">*Namn:</label>
            <input type="text" id="name" placeholder="T.ex. Anna Olsson" required>
            <label for="email">*E-post:</label>
            <input type="email" id="email" placeholder="T.ex. annaolsson@epost.com" required>
            <label for="phone">Telefon:</label>
            <input type="tel" name="phone" id="phone" placeholder="T.ex: +46712345678">
            <label for="message">Meddelande:</label>
            <textarea name="message" id="message"></textarea>

             <button id="sendBtn" type="button" class="inactive" disabled>Boka</button>
        </fieldset>
   

         <div id="buttons">
     <a id="tillbaka" href="../kalender/index.html">&larr; Tillbaka till föregående sida</a>
    
    </div>
</main>

<footer>
        <div>
            <p>Copyright © 2024 Trillingarnas hälsa</p>
        </div>
         <div id="logo">
        <img src="../img/logotyp.svg" alt="Logotyp" width="80">
    </div>
    <div id="kontakt">
        <p>Telefonnummer: 070-123 45 67</p>
        <p>Epost: info@trillingarnashalsa.se</p>
    </div>
    </footer>

</body>
</html>
